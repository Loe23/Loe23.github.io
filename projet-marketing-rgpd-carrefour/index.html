<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://loe23.github.io/#projet-carrefour">
    <title>Redirection vers le projet Carrefour</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #1e2a3a;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px 60px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #eef2f6;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #eef2f6;
            border-top: 4px solid #0a66b9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        a {
            color: #0a66b9;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>🔗 Redirection vers le projet</h2>
        <p style="color: #4a5c6c;">Vous allez être redirigé vers <strong>Analyse RGPD Carrefour</strong>.</p>
        <p>Si la redirection ne fonctionne pas, <a href="https://loe23.github.io/#projet-carrefour">cliquez ici</a>.</p>
    </div>
</body>
</html>
